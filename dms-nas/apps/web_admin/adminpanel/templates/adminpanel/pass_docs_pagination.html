{% load querystring %}
{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="pd-pagination">
  {% if page_obj.has_previous %}
    <a class="pd-page-link" href="{% qs_replace page=page_obj.previous_page_number %}">←</a>
  {% endif %}
  <span class="pd-page-current">Стр. {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a class="pd-page-link" href="{% qs_replace page=page_obj.next_page_number %}">→</a>
  {% endif %}
</nav>
{% endif %}
