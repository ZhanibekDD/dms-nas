version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dms
      POSTGRES_USER:     dms_user
      POSTGRES_PASSWORD: dms_pass_2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./core/schema_postgres.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms_user -d dms"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@dms.local
      PGADMIN_DEFAULT_PASSWORD: Lytgh8989.
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
