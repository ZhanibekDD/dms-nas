{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
.dms-workspace-btn {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  background: rgba(37,99,235,.85) !important;
  color: #fff !important;
  border-radius: 8px;
  padding: 5px 14px !important;
  font-weight: 600;
  font-size: .85rem;
  text-decoration: none !important;
  transition: background .2s;
  margin-right: 6px;
}
.dms-workspace-btn:hover { background: #1d4ed8 !important; color: #fff !important; }
</style>
{% endblock %}

{% block extrajs %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function () {
  var nav = document.querySelector('.navbar-nav.ms-auto');
  if (!nav) return;
  var li = document.createElement('li');
  li.className = 'nav-item';
  li.innerHTML = '<a href="/workspace/pass-docs/employees/" class="nav-link dms-workspace-btn">'
    + '<i class="fas fa-arrow-left" style="font-size:.78rem"></i> Рабочий интерфейс</a>';
  nav.insertBefore(li, nav.firstChild);
});
</script>
{% endblock %}
