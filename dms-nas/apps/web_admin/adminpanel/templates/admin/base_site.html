{% extends "jazzmin/base.html" %}
{% load static %}

{% block branding %}
<a href="{% url 'admin:index' %}" class="brand-link">
  <img src="{% static 'adminpanel/img/logo.jpg' %}"
       alt="Логотип"
       class="brand-image elevation-3"
       style="height:36px;width:36px;border-radius:7px;object-fit:cover;margin-right:8px;">
  <span class="brand-text font-weight-bold" style="color:#FFCC1D;font-size:1.05rem;letter-spacing:.5px">
    ДнепрНАС
  </span>
</a>
{% endblock %}

{% block nav-global %}
<li class="nav-item" style="margin-left:auto;padding-right:8px;">
  <a href="/workspace/pass-docs/employees/" class="nav-link"
     style="display:inline-flex;align-items:center;gap:6px;background:rgba(37,99,235,.85);
            color:#fff;border-radius:8px;padding:5px 14px;font-weight:600;font-size:.85rem;
            letter-spacing:.2px;transition:background .2s;text-decoration:none;">
    <i class="fas fa-arrow-left" style="font-size:.78rem;"></i>
    Рабочий интерфейс
  </a>
</li>
{% endblock %}
